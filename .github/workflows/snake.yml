name: Generate Snake

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create dist folder
        run: mkdir -p dist

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: RosaLlorente
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#a78bfa&color_dots=#ebedf0,#c4b5fd,#a78bfa,#8b5cf6,#6d28d9
            dist/github-contribution-grid-snake-dark.svg?color_snake=#a78bfa&color_dots=#161b22,#312e81,#6d28d9,#8b5cf6,#c4b5fd

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
